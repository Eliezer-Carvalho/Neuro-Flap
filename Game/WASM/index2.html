<body>
  <canvas id = "canvas"> </canvas>

  <script>

    var Module = {
      canvas: document.getElementById("canvas")
    };


    document.addEventListener ("keydown", (event) => {
      if (event.key === " ") {
        Module._GAME_ON();
      }
    })

  

  </script>
